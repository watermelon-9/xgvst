name = "xgvst-workers"
main = "src/index.ts"
compatibility_date = "2026-02-23"
workers_dev = true

routes = [
  { pattern = "xgvst.com/ws/*", zone_name = "xgvst.com" }
]

# Runtime binding contract (no plaintext secrets in repo):
# - CORS_ALLOW_ORIGINS: non-sensitive CSV allowlist (can stay in [vars])
# - ALLTICK_TOKEN/SINA_COOKIE/EASTMONEY_TOKEN/TENCENT_TOKEN: secrets only
#   Inject with: wrangler secret put <NAME>
#   Example: wrangler secret put ALLTICK_TOKEN
[vars]
CORS_ALLOW_ORIGINS = ""

[[kv_namespaces]]
binding = "QUOTE_KV"
id = "e52352ff583f4ebdb6c8256f2a97c931"
preview_id = "a10795c3cd464308883ce1f48ff2281a"

[[d1_databases]]
binding = "QUOTE_DB"
database_name = "xgvst_quote"
database_id = "9db19911-21e7-4245-8c94-6571aa7a35fb"

[[durable_objects.bindings]]
name = "QUOTE_DO"
class_name = "QuoteDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["QuoteDurableObject"]
